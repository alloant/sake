<div class="modal-dialog modal-dialog-centered">
  <form  class="modal-content">

    <div class="modal-header">
      <h5 class="modal-title">Recepient</h5>
      <div>
        <button hx-post="{{hxpost}}&save=1" hx-target="#{{hxtarget}}" type="button" class="btn btn-primary" data-bs-dismiss="modal">
          Save
        </button>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>

    <div class="modal-body">
    <!-- Form -->
    
      <div class="d-flex d-flex-wrap">
        <input type="button" class="btn btn-primary mb-2 mr-2" id="selectall" name="selectall" autocomplete="off" checked onclick="eventCheckBox()" value="All">
        <input class="form-control mb-2" type="search" 
          name="search" placeholder="Begin Typing To Search Users..." 
          hx-post="{{hxpost}}" 
          hx-trigger="input changed delay:500ms, search" 
          hx-target="#search-results"
          hx-indicator=".htmx-indicator">
      </div>

      <ul class="list-group" id="search-results">
        {% include 'register/receivers_list.html' %}
      </ul>
      
      <script>
        function eventCheckBox() {
          let checkboxs = document.getElementsByClassName("chbox");
          let labels = document.getElementsByClassName("chbox_label");

          for(let i = 0; i < checkboxs.length ; i++) {
            checkboxs[i].checked = !checkboxs[i].checked;
          } 
        }
      </script>

    <!-- End form -->
    </div>

    <div class="modal-footer">
    </div>

  </form>
</div>
