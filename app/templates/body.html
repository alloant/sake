<div id="body-title">
  <h1 class="title text-center display-4">
    <img src="{{title['icon']}}" width="70vmin" height="70vmin">
    {{title['text']}}
    
    {% if session['theme'] == 'light-mode' %}
      <img id="indicator-table" class="htmx-indicator" width="20" src="static/icons/bars.svg">
    {% else %}
      <img id="indicator-table" class="htmx-indicator" width="20" src="static/icons/bars-dark.svg">
    {% endif %}


  </h1>

  <div class="d-flex flex-row mb-4">
    {% if title['new'] %}
    <button class="btn btn-primary" hx-get="/action_note?action=new" hx-trigger="click" hx-target="#body-table" hx-indicator="#indicator-table" hx-disinherit="*">{{gettext('New')}}</button>
    {% endif %}
   
    {% if title['showAll'] %}
      <div class="p-2">
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" role="switch" id="flexSwitchCheckDefault" hx-post="/body_table?showAll=toggle" hx-trigger="click" hx-target="#body-table" hx-disinherit="*" {% if session['showAll'] %} checked {% endif %}>
          <label class="form-check-label" for="flexSwitchCheckDefault">{{gettext('All')}}</label>
        </div>
      </div>
    {% endif %}
 
    {% if title['filter'] %}
      <input class="form-control flex-grow-1" type="search" 
        name="search" placeholder="Search..." id="search_text"
        hx-post="/body_table" 
        hx-trigger="input changed delay:500ms, search" 
        hx-target="#body-table"> 
    {% endif %}
  </div>

  {% if title['sendmail'] %}
  <button class="btn btn-primary" hx-get="/action_note?action=sendmail&reg={{reg}}" hx-trigger="click" hx-target="#body-table" hx-indicator="#indicator-table" hx-disinherit="*">{{gettext('Send mail')}}</button>
  {% endif %}
</div>


<div id="body-table" class="">
  {% include 'table/table.html' %}
</div>
